# Build and publish a self-contained n8n-smbclient Docker image. The image
# tracks the latest stable upstream n8n release and includes the
# n8n-nodes-smbclient community node pre-installed, so it works out of the box
# without a runtime bind-mount. Runs daily and on demand.
#
# Required repository secrets (set in Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  - Docker Hub username (e.g. delasrc)
#   DOCKERHUB_TOKEN     - Docker Hub access token with push rights

name: Track upstream n8n and publish image

on:
  schedule:
    # 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest stable n8n version
        id: upstream
        run: |
          set -euo pipefail
          RESPONSE=$(curl -fsSL https://api.github.com/repos/n8n-io/n8n/releases/latest)
          TAG=$(printf '%s' "$RESPONSE" | jq -r '.tag_name')
          PRERELEASE=$(printf '%s' "$RESPONSE" | jq -r '.prerelease')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Could not determine latest n8n release" >&2
            exit 1
          fi
          if [ "$PRERELEASE" != "false" ]; then
            echo "Latest release $TAG is a pre-release; skipping." >&2
            exit 1
          fi
          VERSION="${TAG#n8n@}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest stable n8n version: $VERSION"

      - name: Check if rebuild is needed
        id: needs-build
        run: |
          set -euo pipefail
          CURRENT=$(cat .n8n-version 2>/dev/null || echo "")
          UPSTREAM="${{ steps.upstream.outputs.version }}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "upstream=$UPSTREAM" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$UPSTREAM" ]; then
            echo "already_latest=true" >> "$GITHUB_OUTPUT"
            echo "Already on latest n8n version ($CURRENT). No build needed."
          else
            echo "already_latest=false" >> "$GITHUB_OUTPUT"
            echo "New upstream version detected: $CURRENT -> $UPSTREAM"
          fi

      - name: Update version files
        if: steps.needs-build.outputs.already_latest != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.needs-build.outputs.upstream }}"
          # Update the Dockerfile default ARG
          sed -i.bak "s/^ARG N8N_VERSION=.*/ARG N8N_VERSION=$VERSION/" docker/Dockerfile
          rm -f docker/Dockerfile.bak
          # Persist the version we are building
          printf '%s\n' "$VERSION" > .n8n-version

      - name: Commit version bump
        if: steps.needs-build.outputs.already_latest != 'true'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docker/Dockerfile .n8n-version
          VERSION="${{ steps.needs-build.outputs.upstream }}"
          git diff --cached --quiet || git commit -m "chore(deps): bump n8n to $VERSION"
          git push origin HEAD

      - name: Set up QEMU
        if: steps.needs-build.outputs.already_latest != 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.needs-build.outputs.already_latest != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.needs-build.outputs.already_latest != 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: steps.needs-build.outputs.already_latest != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/n8n-smbclient:${{ steps.needs-build.outputs.upstream }}
            ${{ secrets.DOCKERHUB_USERNAME }}/n8n-smbclient:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
